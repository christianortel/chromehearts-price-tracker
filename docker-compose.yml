version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chromehearts}
      POSTGRES_USER: ${POSTGRES_USER:-chromehearts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chromehearts}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/api:/app/apps/api
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: celery -A app.tasks.celery_app worker -l info
    env_file:
      - .env
    volumes:
      - ./apps/api:/app/apps/api
      - ./scripts:/app/scripts
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/web:/app/apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:

